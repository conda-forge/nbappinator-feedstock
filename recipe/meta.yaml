{% set name = "nbappinator" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nbappinator-{{ version }}.tar.gz
  sha256: ac6aefe2965272fb0191558c1fc318963bff47d902b9963379ac95b658a2ff50

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11,<4.0
    - poetry-core >=1.0.0
    - poetry-dynamic-versioning >=1.0.0,<2.0.0
    - pip
  run:
    - anywidget >=0.9.0
    - python >=3.11.0,<4.0.0
    - plotly >=5.22.0
    - ipywidgets >=8.1.3
    - ipyvuetify >=1.9.4
    - ipyaggrid >=0.5.4
    - ipytree >=0.2.2
    - pandas >=2.2.2

test:
  imports:
    - nbappinator
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/iqmo-org/nbappinator
  dev_url: https://github.com/iqmo-org/nbappinator
  summary: Jupyter Notebook Application Builder
  license: BSD-3-Clause
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - paultiq
